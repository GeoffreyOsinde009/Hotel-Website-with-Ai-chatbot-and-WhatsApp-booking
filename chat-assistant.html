<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubai Hotel – Chat Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --dark: #0e0d0b;
    --dark2: #1a1814;
    --dark3: #252219;
    --surface: #1e1c17;
    --text: #f0ead8;
    --muted: #8a8270;
    --border: rgba(201,169,110,0.18);
  }

  body {
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,169,110,0.07) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,169,110,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,169,110,0.03) 40px);
  }

  .chat-wrapper {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .chat-header {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .hotel-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--gold) 0%, #a07840 100%);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.03em;
  }

  .header-text p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px #4ade8088;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.5; }
  }

  /* Messages area */
  .chat-messages {
    background: var(--surface);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: 440px;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s ease both;
    max-width: 88%;
  }

  @keyframes msgIn {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    margin-top: 2px;
  }

  .msg.bot .avatar  { background: linear-gradient(135deg, var(--gold), #7a5a28); }
  .msg.user .avatar { background: var(--dark3); border: 1px solid var(--border); }

  .bubble {
    padding: 11px 16px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.65;
    max-width: 100%;
  }

  .msg.bot .bubble {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #8a6830, #5c4420);
    border: 1px solid rgba(201,169,110,0.3);
    border-bottom-right-radius: 4px;
    color: var(--gold-light);
  }

  .bubble strong { color: var(--gold); font-weight: 500; }
  .bubble ul { padding-left: 16px; margin-top: 6px; }
  .bubble li { margin-bottom: 3px; }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 8px;
  }

  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--gold-light);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .qr-btn:hover {
    background: rgba(201,169,110,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Typing indicator */
  .typing { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .chat-input-area {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-top: 1px solid rgba(201,169,110,0.1);
    border-radius: 0 0 16px 16px;
    padding: 16px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 100px;
    transition: border-color 0.2s;
  }

  .input-box::placeholder { color: var(--muted); }
  .input-box:focus { border-color: rgba(201,169,110,0.4); }

  .send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold) 0%, #8a6020 100%);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(201,169,110,0.35); }
  .send-btn svg { width: 17px; height: 17px; fill: #0e0d0b; }

  .hint {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 12px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="hotel-icon">🏨</div>
    <div class="header-text">
      <h1>Dubai Hotel Assistant</h1>
      <p>Embu, Kenya · 24/7 Concierge</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area">
    <textarea class="input-box" id="userInput" placeholder="Ask about rooms, prices, services…" rows="1"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>
<p class="hint">Press Enter to send · Shift+Enter for new line</p>

<script>
// ─── Intelligent Chat Client with Server Integration ───────────────────────────────
const messagesEl = document.getElementById('chatMessages');
const inputEl = document.getElementById('userInput');
const API_URL = '/api/chat';
const sessionId = Math.random().toString(36).substring(7);

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendMessage(role, html, qr) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🏨' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html.replace(/\n/g, '<br>');

  if (qr && role === 'bot') {
    const qrDiv = document.createElement('div');
    qrDiv.className = 'quick-replies';
    qr.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = label;
      btn.onclick = () => {
        // Handle navigation actions
        if (label === 'Go to Booking Form' || label === 'Book this room' || label === 'Book now' || 
            label === 'Book a room' || label === 'Book Now') {
          window.location.href = '/#reservation';
          return;
        }
        inputEl.value = label; 
        sendMessage();
      };
      qrDiv.appendChild(btn);
    });
    bubble.appendChild(qrDiv);
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollBottom();
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing-indicator';
  msg.innerHTML = `<div class="avatar">🏨</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(msg);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  appendMessage('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';

  showTyping();
  
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId })
    });

    const data = await response.json();
    
    // Handle navigation actions
    if (data.action === 'scrollToReservation') {
      // Navigate to main page and scroll to reservation section
      window.location.href = '/#reservation';
      return;
    }
    
    // Add slight delay for better UX
    setTimeout(() => {
      removeTyping();
      appendMessage('bot', data.text, data.qr);
    }, 500 + Math.random() * 300);
  } catch (error) {
    removeTyping();
    appendMessage('bot', "Sorry, I encountered an error processing your request. Please try again.", ['Room prices', 'Contact us']);
  }
}

// Auto-resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Welcome message on load
window.addEventListener('load', () => {
  setTimeout(() => {
    appendMessage('bot', "Welcome to <strong>Dubai Hotel</strong>! 🏨\n\nI'm your intelligent 24/7 virtual concierge. I understand natural language and can help with rooms, bookings, services, and much more.\n\nWhat can I assist you with today?", ["Room prices", "Check-in time", "Breakfast info", "Book a room", "Contact us", "Our services"]);
  }, 400);
});
</script>
</body>
</html>
